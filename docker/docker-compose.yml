version: "3.9"

services:
  ocr-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: meter_ocr_api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=4
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  qc-dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: meter_ocr_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run qc_interface/dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - ocr-api
    restart: unless-stopped

networks:
  default:
    name: meter_ocr_network